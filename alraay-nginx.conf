server {
        server_name srv1318325.hstgr.cloud;

        # Frontend (Port 4000)
        location / {
                proxy_pass http://localhost:4000;
                proxy_http_version 1.1;
                proxy_set_header Upgrade $http_upgrade;
                proxy_set_header Connection 'upgrade';
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
                proxy_cache_bypass $http_upgrade;
        }

        # Backend API (Port 4002) - إزالة /api من المسار
        location /api/ {
                rewrite ^/api/(.*) /$1 break;
                proxy_pass http://localhost:4002;
                proxy_http_version 1.1;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
                client_max_body_size 50M;
        }

        # Admin Dashboard (Port 4001)
        location /admin {
                proxy_pass http://localhost:4001;
                proxy_http_version 1.1;
                proxy_set_header Upgrade $http_upgrade;
                proxy_set_header Connection 'upgrade';
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
                proxy_cache_bypass $http_upgrade;
        }

    # ملاحظة: قم بتفعيل هذه الأسطر أدناه فقط بعد إعداد شهادة SSL باستخدام Certbot:
    # listen 443 ssl; 
    # ssl_certificate /etc/letsencrypt/live/srv1318325.hstgr.cloud/fullchain.pem; 
    # ssl_certificate_key /etc/letsencrypt/live/srv1318325.hstgr.cloud/privkey.pem; 
    # include /etc/letsencrypt/options-ssl-nginx.conf; 
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; 
}

# توجيه ترافيك HTTP إلى HTTPS
server {
    if ($host = srv1318325.hstgr.cloud) {
        return 301 https://$host$request_uri;
    } 

    listen 80;
    server_name srv1318325.hstgr.cloud;
    return 404; 
}
